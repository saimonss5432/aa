<p style="position:absolute;top:208px;left:11px;white-space:nowrap" class="ft01">•মবজবজকক&#160;স্বভ্াজবর&#160;উের&#160;প্ররবল&#160;রখা।</p>
<p style="position:absolute;top:251px;left:11px;white-space:nowrap" class="ft01">•েমরক্ষায়&#160;দৃঢ়ো&#160;অবলম্বন&#160;করা।</p>
<p style="position:absolute;top:295px;left:11px;white-space:nowrap" class="ft01">•আল্লহর&#160;িহব্বেজক&#160;সব&#160;মকছুর&#160;উজে&#160;সাথােন&#160;করা।</p>
