<p style="position:absolute;top:66px;left:11px;white-space:nowrap" class="ft00">েীবন-িালাকুল&#160;িওে&#160;আল্লাহর&#160;কাজছ&#160;মনয়&#160;যয়্।</p>
<p style="position:absolute;top:116px;left:11px;white-space:nowrap" class="ft00">•িাংস-িাংস&#160;অহাজযয&#160;েমরর্ে&#160;হয়।</p>
<p style="position:absolute;top:167px;left:11px;white-space:nowrap" class="ft00">•হড়-কালক্রজি&#160;িাটিজে&#160;েমরর্ে&#160;হয়।</p>
<p style="position:absolute;top:217px;left:11px;white-space:nowrap" class="ft00">•ইবাদে-দাবীদারগর্&#160;ভ্াগ&#160;কজর&#160;তনয়।</p>
<p style="position:absolute;top:266px;left:11px;white-space:nowrap" class="ft00">•তকবল&#160;ঈিাজনর&#160;েনয&#160;সাবধন&#160;থাক&#160;িৃেুয&#160;কাজল</p>
<p style="position:absolute;top:318px;left:11px;white-space:nowrap" class="ft00">ো&#160;তযন&#160;শয়োন&#160;মনজয়&#160;না&#160;যায়।</p>
