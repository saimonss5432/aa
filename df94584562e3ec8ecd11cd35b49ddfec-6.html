<p style="position:absolute;top:318px;left:11px;white-space:nowrap" class="ft00"><b>িকওয়&#160;কারীকক&#160;আল্লাহ&#160;৩&#160;টি&#160;ডনয়ামি&#160;িান&#160;ককরন:-</b></p>
<p style="position:absolute;top:344px;left:11px;white-space:nowrap" class="ft01">•কুরআন-আল্লহ&#160;োজদর&#160;এিন&#160;জ্ঞন&#160;দান&#160;কজরন&#160;যাজে&#160;োর&#160;েজক্ষ&#160;ভ্াজলা&#160;িন্দ&#160;োথণকয&#160;বুঝজে</p>
<p style="position:absolute;top:370px;left:11px;white-space:nowrap" class="ft01">োজর।</p>
<p style="position:absolute;top:395px;left:11px;white-space:nowrap" class="ft01">•িাগজেরাে-আমখরাজে&#160;সব&#160;োে&#160;ক্ষিা&#160;কজর&#160;মদজবন।</p>
<p style="position:absolute;top:420px;left:11px;white-space:nowrap" class="ft01">•কােোরা-&#160;েীবজন&#160;তয&#160;সকল&#160;ক্রটি&#160;মবচ্চুমে&#160;ঘজে&#160;দুমনয়াজে&#160;োর&#160;কােোরা&#160;বা&#160;বদলা&#160;বযবস্তা</p>
<p style="position:absolute;top:445px;left:11px;white-space:nowrap" class="ft01">আল্লাহ&#160;কজর&#160;তদন।</p>
