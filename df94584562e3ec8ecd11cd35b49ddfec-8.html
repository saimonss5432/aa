<p style="position:absolute;top:301px;left:11px;white-space:nowrap" class="ft00">•েের-হুয়াল&#160;হাইয়ুল&#160;কাইয়ুি&#160;(১০০বার)।</p>
<p style="position:absolute;top:327px;left:11px;white-space:nowrap" class="ft00">•তোহর-হুয়ল&#160;আমলয়ুল&#160;আেীি(১০০বার)।</p>
<p style="position:absolute;top:352px;left:11px;white-space:nowrap" class="ft00">•আসর-হুয়াল&#160;রাহিানুর&#160;রাহীি(১০০বার)।</p>
<p style="position:absolute;top:377px;left:11px;white-space:nowrap" class="ft00">•িাগমরব-হুয়াল&#160;গােুরুর&#160;রাহীি(১০০বার)।</p>
<p style="position:absolute;top:402px;left:11px;white-space:nowrap" class="ft00">•এশা-হুয়াল&#160;লামেেুল&#160;খাবীর(১০০বার)।</p>
